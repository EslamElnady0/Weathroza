name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_upload:
    name: Build APK and Upload to Google Drive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Get access token
        run: |
          pip install google-auth requests --quiet
          python3 - <<'EOF'
          import google.auth
          import google.oauth2.service_account as sa
          import json, os

          creds = sa.Credentials.from_service_account_file(
              '/tmp/credentials.json',
              scopes=['https://www.googleapis.com/auth/drive']
          )
          creds.refresh(google.auth.transport.requests.Request())
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"ACCESS_TOKEN={creds.token}\n")
          EOF

      - name: Upload APK to Google Drive
        run: |
          curl -X POST \
            "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true" \
            -H "Authorization: Bearer ${{ env.ACCESS_TOKEN }}" \
            -F "metadata={name: 'weathroza-build-${{ github.run_number }}.apk', parents: ['${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}']};type=application/json;charset=UTF-8" \
            -F "file=@app/build/outputs/apk/debug/app-debug.apk;type=application/vnd.android.package-archive"