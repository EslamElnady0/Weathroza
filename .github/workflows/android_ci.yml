name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_upload:
    name: Build APK and Upload to Google Drive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Write and encode credentials
        run: |
          echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > /tmp/credentials.json
          echo "CREDENTIALS_B64=$(base64 -w 0 /tmp/credentials.json)" >> $GITHUB_ENV

      - name: Upload APK to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ env.CREDENTIALS_B64 }}
          filename: app/build/outputs/apk/debug/app-debug.apk
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          name: weathroza-build-${{ github.run_number }}.apk
          overwrite: false