name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_and_upload:
    name: Build APK and Upload to Google Drive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle


      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK to Google Drive
        run: |
          echo '${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}' > /tmp/credentials.json
          pip install google-auth requests --quiet
          python3 - <<'EOF'
          import google.auth.transport.requests
          import google.oauth2.service_account as sa
          import requests, os
          
          creds = sa.Credentials.from_service_account_file(
              '/tmp/credentials.json',
              scopes=['https://www.googleapis.com/auth/drive']
          )
          creds.refresh(google.auth.transport.requests.Request())
          
          metadata = {
              'name': f"weathroza-build-{os.environ['GITHUB_RUN_NUMBER']}.apk",
              'parents': ['${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}']
          }
          
          with open('app/build/outputs/apk/debug/app-debug.apk', 'rb') as apk:
              files = {
                  'metadata': ('metadata', str(metadata).replace("'", '"'), 'application/json'),
                  'file': ('app-debug.apk', apk, 'application/vnd.android.package-archive')
              }
              response = requests.post(
                  'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true',
                  headers={'Authorization': f'Bearer {creds.token}'},
                  files=files
              )
          print(response.status_code, response.text)
          if not response.ok:
              exit(1)
          EOF